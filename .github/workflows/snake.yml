name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # twice daily
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: snake
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Generate snake SVGs (metallic light + dark)
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#5b6472&color_dots=#eef1f4,#c9d1d9,#8b98a5,#5b6472,#1c2128
            dist/github-snake-dark.svg?color_snake=#e8eaed&color_dots=#11151c,#2a2f3a,#5b6472,#8b98a5,#c9d1d9

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
